<!DOCTYPE html>
<html lang="id">


<head>
  <!-- ================= BASIC ================= -->
  <meta 
    charset="UTF-8">
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0">

  <!-- ================= SEO ================= -->
  <title>
    Data Belum Tersedia
  </title>

  <meta
    name="description"
    content="Halaman yang Anda tuju masih dalam proses pengembangan oleh tim HaRin.">
  <meta
    name="keywords"
    content="Data belum tersedia, halaman dalam pengembangan, perbaikan tim HaRin">
  <meta 
    name="author" 
    content="HaRin">

  <!-- ================= THEME ================= -->
  <meta 
    name="theme-color" 
    content="#ffffff">

  <!-- ================= GOOGLE INDEX ================= -->
  <meta 
    name="robots" 
    content="noindex, nofollow">

  <!-- ================= OPEN GRAPH ================= -->
  <meta 
    property="og:title" 
    content="Data Belum Tersedia">
  <meta 
    property="og:description"
    content="Halaman yang Anda tuju masih dalam proses pengembangan oleh tim HaRin.">
  <meta 
    property="og:type" 
    content="website">
  <meta 
    property="og:image" 
    content="https://harinesia.com/assets/favicon.webp">

  <!-- ================= FAVICON ================= -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon"
        type="image/png"
        sizes="32x32"
        href="/assets/favicon-32x32.png">
  <link rel="icon"
        type="image/png"
        sizes="16x16"
        href="/assets/favicon-16x16.png">
  <link rel="apple-touch-icon"
        sizes="180x180"
        href="/assets/apple-touch-icon.png">
  <link rel="manifest"
        href="/site.webmanifest">
  <meta
    name="theme-color"
    content="#0f766e">

  <!-- ================= FONT ================= -->
  <link 
    rel="preconnect" 
    href="https://fonts.googleapis.com">
  <link 
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">


  <style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#ffffff;
    text-align:center;
    padding:20px;
  }

  .empty-page{
    max-width:700px;
  }

  .empty-icon{
    font-size:7rem;
    color:#000000;
    margin-bottom:25px;
    animation:float 3s ease-in-out infinite;
  }

  .empty-page h1{
    font-size:3rem;
    font-weight:700;
    color:#000000;
    margin-bottom:18px;
  }

  .empty-page p{
    font-size:1.1rem;
    color:#444;
    line-height:1.8;
  }


  @keyframes float{
    0%{
      transform:translateY(0px);
    }

    50%{
      transform:translateY(-12px);
    }

    100%{
      transform:translateY(0px);
    }
  }


  @media(max-width:768px){
    .empty-icon{
      font-size:5rem;
    }

    .empty-page h1{
      font-size:2rem;
    }
  }
  </style>
</head>


<body>
  <main class="empty-page">
    <div class="empty-icon">
      ⬛
    </div>
    <h1>
      Maaf, Data Belum Tersedia
    </h1>
    <p>
      Halaman yang Anda tuju masih dalam proses pengembangan.
    </p>
  </main>
</body>
</html>
